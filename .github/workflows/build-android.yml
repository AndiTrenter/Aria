name: Build Android APK

# Trigger:
#   - On every push to main (build a debug-signed APK for internal testing)
#   - On every tag matching v* (e.g. v1.2.3) — creates a GitHub release
#     with the signed APK attached, which the in-app UpdateNotifier
#     will pick up automatically.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to create releases

env:
  # Production backend the bundled webview should hit
  REACT_APP_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
  # GitHub repo that the UpdateNotifier + Account download card poll
  REACT_APP_GITHUB_REPO: ${{ github.repository }}

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
        # NOTE: yarn cache intentionally disabled — if frontend/yarn.lock
        # is ever missing from the repo, the cache step would hard-fail
        # the whole build. yarn install is fast enough without it.

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Compute app version
        id: version
        # Strategy: use `0.0.<run_number>` as a monotonically increasing
        # semver-ish version so the in-app UpdateNotifier can simply
        # compare with the GitHub `releases/latest` tag (also `0.0.<n>`)
        # and surface upgrades on every successful main-push build.
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tagged stable release wins — use the actual tag
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            # Auto-incremented version derived from the workflow run number
            echo "version=0.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install frontend deps
        working-directory: frontend
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          else
            echo "::warning::yarn.lock missing — installing without lockfile"
            yarn install
          fi

      - name: Build React app
        working-directory: frontend
        env:
          # Explicitly forward both env vars to the webpack step. The top-level
          # workflow `env:` block is supposed to inherit, but locally-scoped
          # `env:` (here) takes precedence and guarantees they're present.
          REACT_APP_APP_VERSION: ${{ steps.version.outputs.version }}
          REACT_APP_GITHUB_REPO: ${{ github.repository }}
          REACT_APP_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
          CI: "false"   # let warnings through; webpack treats them as errors on CI by default
          DISABLE_ESLINT_PLUGIN: "true"
        run: yarn build

      - name: Add Android platform (first run only)
        working-directory: frontend
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Patch AndroidManifest for mic / network permissions
        working-directory: frontend/android/app/src/main
        run: |
          MANIFEST=AndroidManifest.xml
          # ── Required runtime permissions ───────────────────────────
          # RECORD_AUDIO        — Web Speech API + native plugin
          # MODIFY_AUDIO_SETTINGS — TTS playback ducking
          # WAKE_LOCK           — keep service alive during recogniser
          # ACCESS_NETWORK_STATE — backend reachability checks
          for perm in RECORD_AUDIO MODIFY_AUDIO_SETTINGS WAKE_LOCK ACCESS_NETWORK_STATE; do
            if ! grep -q "$perm" "$MANIFEST"; then
              sed -i "s|<uses-permission android:name=\"android.permission.INTERNET\" />|<uses-permission android:name=\"android.permission.INTERNET\" />\n    <uses-permission android:name=\"android.permission.${perm}\" />|" "$MANIFEST"
            fi
          done
          # Allow HTTP traffic to the user's local ARIA backend (Unraid LAN IP)
          if ! grep -q "usesCleartextTraffic" "$MANIFEST"; then
            sed -i 's|<application |<application android:usesCleartextTraffic="true" |' "$MANIFEST"
          fi
          # <queries> block — Android 11+ requires this for the speech
          # recognition plugin to find the system RecognitionService.
          # Without it, SpeechRecognition.available() returns false.
          if ! grep -q "android.speech.RecognitionService" "$MANIFEST"; then
            awk '
              /<\/manifest>/ {
                print "  <queries>"
                print "    <intent>"
                print "      <action android:name=\"android.speech.RecognitionService\" />"
                print "    </intent>"
                print "    <intent>"
                print "      <action android:name=\"android.speech.action.RECOGNIZE_SPEECH\" />"
                print "    </intent>"
                print "  </queries>"
              }
              { print }
            ' "$MANIFEST" > "$MANIFEST.new"
            mv "$MANIFEST.new" "$MANIFEST"
          fi
          # Set versionName / versionCode so each build is distinct
          GRADLE=../../build.gradle
          if [ -f "$GRADLE" ]; then
            VC=$(date +%s)
            sed -i "s|versionName .*|versionName \"${{ steps.version.outputs.version }}\"|" "$GRADLE" || true
            sed -i "s|versionCode .*|versionCode ${VC: -8}|" "$GRADLE" || true
          fi
          echo "── AndroidManifest.xml ──"
          cat "$MANIFEST"

      - name: Sync Capacitor → Android
        working-directory: frontend
        run: npx cap sync android

      - name: Generate launcher icon + splash from SVG sources
        # Rasterises /app/frontend/resources/{icon,splash}.svg via librsvg
        # and then lets @capacitor/assets fan everything out into all
        # Android densities (mdpi, hdpi, xhdpi, xxhdpi, xxxhdpi) plus the
        # adaptive-icon foreground / background layers + splash screen.
        # No animation here — Android doesn't allow animated launcher icons —
        # but the icon itself is a neural orb that pops on the home screen.
        working-directory: frontend
        run: |
          sudo apt-get update -y && sudo apt-get install -y --no-install-recommends librsvg2-bin || true
          mkdir -p assets
          # 1) Rasterise to high-res PNG (1024 + 2732)
          rsvg-convert -w 1024 -h 1024 resources/icon.svg   -o assets/icon-only.png
          rsvg-convert -w 2732 -h 2732 resources/splash.svg -o assets/splash.png
          # @capacitor/assets needs three inputs: icon, icon-foreground, icon-background
          # We split the icon manually: foreground is the same neural orb,
          # background is a flat dark navy disc — the OS automatically
          # combines them for the adaptive-icon mask.
          cp assets/icon-only.png assets/icon.png
          cp assets/icon-only.png assets/icon-foreground.png
          # Solid dark background (will be visible behind round/square masks)
          rsvg-convert -w 1024 -h 1024 \
            <(printf '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024"><rect width="1024" height="1024" fill="#0b0712"/></svg>') \
            -o assets/icon-background.png
          # Dark variants for night-mode splash
          cp assets/splash.png assets/splash-dark.png
          # 2) Generate every Android density via the official tool
          npx --yes @capacitor/assets generate --android \
            --iconBackgroundColor '#0b0712' \
            --iconBackgroundColorDark '#0b0712' \
            --splashBackgroundColor '#0b0712' \
            --splashBackgroundColorDark '#0b0712' || true
          # 3) Confirm output
          echo "── generated res/mipmap-* ──"
          ls -la android/app/src/main/res/mipmap-* 2>/dev/null | head -20 || true

      - name: Cache debug keystore (deterministic signature across all builds)
        # IMPORTANT for in-app updates:
        # Android refuses to install an APK over an existing one if the
        # signature differs. Every `keytool -genkeypair` invocation creates
        # a NEW cryptographically random key — even with identical DN/passwords —
        # so generating in CI produces a different signature on every run.
        # We pin the keystore via GitHub Actions cache: the very first run
        # generates one; all subsequent runs RESTORE the SAME keystore from
        # cache, giving every APK an identical signature.
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          # Bump the version suffix only when you intentionally want to
          # invalidate and re-issue keys (forces a one-time uninstall).
          key: aria-android-debug-keystore-v1

      - name: Generate debug keystore (only if cache missed)
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=ARIA Debug, OU=ARIA, O=Trenter, L=Zurich, ST=ZH, C=CH"

      - name: Mirror keystore into project
        # Some Gradle configurations look for the keystore in the project
        # directory, others in ~/.android — keep both in sync.
        run: |
          mkdir -p frontend/android/app
          cp ~/.android/debug.keystore frontend/android/app/debug.keystore
          # Print SHA so we can confirm signature consistency across runs.
          sha256sum ~/.android/debug.keystore || true

      - name: Pin debug signingConfig in app/build.gradle
        working-directory: frontend/android/app
        run: |
          GRADLE=build.gradle
          if ! grep -q "signingConfigs {" "$GRADLE"; then
            # Insert a signingConfigs block right after `android {`.
            # We do this with awk to avoid YAML-indentation headaches.
            awk '
              BEGIN { injected = 0 }
              /^android[[:space:]]*\{[[:space:]]*$/ && injected == 0 {
                print
                print "    signingConfigs {"
                print "        debug {"
                print "            storeFile file(\"debug.keystore\")"
                print "            storePassword \"android\""
                print "            keyAlias \"androiddebugkey\""
                print "            keyPassword \"android\""
                print "        }"
                print "    }"
                injected = 1
                next
              }
              { print }
            ' "$GRADLE" > "$GRADLE.new"
            mv "$GRADLE.new" "$GRADLE"
          fi
          echo "── build.gradle (head) ──"
          head -n 40 build.gradle

      - name: Build APK (debug)
        if: steps.version.outputs.is_release == 'false'
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build APK (release, unsigned)
        if: steps.version.outputs.is_release == 'true'
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign release APK
        if: steps.version.outputs.is_release == 'true' && env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: frontend/android/app/build/outputs/apk/release
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.jks
          BT=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          ALIGN="$ANDROID_HOME/build-tools/$BT/zipalign"
          SIGN="$ANDROID_HOME/build-tools/$BT/apksigner"
          IN_APK=app-release-unsigned.apk
          ALIGNED=app-release-aligned.apk
          OUT_APK=app-release-signed.apk
          "$ALIGN" -v 4 "$IN_APK" "$ALIGNED"
          "$SIGN" sign --ks release.jks \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out "$OUT_APK" "$ALIGNED"
          rm -f release.jks
          ls -lah

      - name: Rename + upload debug APK as artifact
        if: steps.version.outputs.is_release == 'false'
        working-directory: frontend/android/app/build/outputs/apk/debug
        run: |
          mv app-debug.apk "aria-${{ steps.version.outputs.version }}-debug.apk"
          ls -lah

      - name: Upload debug APK artifact
        if: steps.version.outputs.is_release == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: aria-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # Every successful main-push gets its own GitHub Release tagged
      # `v0.0.<run_number>`. Marked as a normal (non-prerelease) so the
      # `releases/latest` endpoint returns it, which is what both the
      # in-app UpdateNotifier and the Account-page download card poll.
      - name: Publish auto-versioned release (on main push)
        if: steps.version.outputs.is_release == 'false' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "A.R.I.A. v${{ steps.version.outputs.version }}"
          body: |
            Automatischer Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
          prerelease: false
          make_latest: "true"
          files: |
            frontend/android/app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: false

      - name: Create GitHub Release (on tag)
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: A.R.I.A. v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            frontend/android/app/build/outputs/apk/release/app-release-signed.apk
            frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk
          fail_on_unmatched_files: false
